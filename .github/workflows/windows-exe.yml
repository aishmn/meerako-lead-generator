name: Build Windows Portable EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build single-file Windows EXE
        run: npm run dist:win:portable

      - name: Smoke test on Windows runner
        shell: pwsh
        run: |
          $logPath = Join-Path $env:APPDATA "Meerako Lead Generator\logs\main.log"
          if (Test-Path $logPath) { Remove-Item $logPath -Force }

          $exe = Get-ChildItem -Path dist -Filter *.exe | Select-Object -First 1
          if (-not $exe) { throw "Portable EXE not found in dist/" }
          Write-Host "Launching $($exe.FullName)"

          $proc = Start-Process -FilePath $exe.FullName -PassThru
          $deadline = (Get-Date).AddSeconds(90)
          $hasStart = $false
          $hasIpc = $false
          $hasRenderer = $false
          $rootLen = $null
          $log = ""

          while ((Get-Date) -lt $deadline) {
            if (Test-Path $logPath) {
              $log = Get-Content -Path $logPath -Raw
              $hasStart = $log -match "\[app\] starting"
              $hasIpc = $log -match "\[ipc\] all handlers registered"
              $hasRenderer = $log -match "\[renderer\] post-load state"
              if ($hasRenderer) {
                $m = [regex]::Match($log, "rootLen:\s*(\d+)")
                if ($m.Success) {
                  $rootLen = [int]$m.Groups[1].Value
                }
              }
              if ($hasStart -and $hasIpc) { break }
            }
            Start-Sleep -Seconds 2
          }

          if (-not $proc.HasExited) {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }
          Get-Process -Name "meerako-lead-generator" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue

          if (-not (Test-Path $logPath)) {
            throw "Smoke test failed: main log not created at $logPath"
          }

          if (-not ($hasStart -and $hasIpc)) {
            Write-Host "---- main.log tail ----"
            Get-Content -Path $logPath -Tail 80
            throw "Smoke test failed: app did not reach startup + IPC registration markers."
          }

          if ($hasRenderer) {
            if ($null -ne $rootLen -and $rootLen -le 0) {
              throw "Smoke test failed: renderer rootLen <= 0."
            }
            Write-Host "Smoke test passed (renderer mounted, rootLen=$rootLen)."
          } else {
            Write-Warning "Renderer post-load marker not found on CI runner; startup markers passed."
          }

      - name: List generated artifacts
        run: Get-ChildItem -Path dist -Recurse

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meerako-lead-generator-portable-windows-x64
          path: dist/*.exe
          if-no-files-found: error
