name: Build Windows Portable EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build single-file Windows EXE
        run: npm run dist:win:portable

      - name: List generated artifacts
        run: Get-ChildItem -Path dist -Recurse

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meerako-lead-generator-portable-windows-x64
          path: dist/*.exe
          if-no-files-found: error
